<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">

        <aside class="sidebar">
            <div class="logo">
                <h2>Spotify</h2>
            </div>

            <nav class="menu">
                <ul>
                    <li class="active">Inicio</li>
                    <li>Buscar</li>
                    <li>Tu Biblioteca</li>
                </ul>
            </nav>

            <div class="playlist">
                <h4>Playlists</h4>
                <ul>
                    <li>Mis Favoritos</li>
                    <li>Top 2026</li>
                    <li>Relax</li>
                </ul>
            </div>
        </aside>

        <main class="main">

            <header class="header">
                <input type="text" placeholder="Buscar música..." class="search">
                <div class="user">
                    <span>Usuario</span>
                </div>
            </header>

            <section class="section">
                <h2>Recomendado</h2>

                <div class="cards-container">
                    <div class="card">
                        <img src="assets/img/Juanes.jpg" alt="Album">
                        <h3>Juanes</h3>
                        <p>Descripción corta</p>
                    </div>

                    <div class="card">
                        <img src="assets/img/Grupo5.jpg" alt="Album">
                        <h3>Grupo 5</h3>
                        <p>Descripción corta</p>
                    </div>
                </div>
            </section>

            <section class="section">
                <h2>Tus canciones</h2>
                <div class="songs-list">
                    <div class="song-card">
                        <img src="assets/img/song1.jpg" alt="Song">
                        <div class="song-info">
                            <h4>Cancion 1</h4>
                            <p>Artista</p>
                        </div>
                        <button class="play-btn">▶</button>
                    </div>

                    <div class="song-card">
                        <img src="assets/img/song2.jpg" alt="Song">
                        <div class="song-info">
                            <h4>Canción 2</h4>
                            <p>Artista</p>
                        </div>
                        <button class="play-btn">▶</button>
                    </div>
                    
                </div>
            </section>
        </main>
    </div>

    <footer class="player">

        <div class="player-left">
            <img src="assets/img/song1.jpg" alt="Now Playing">
            <div>
                <h4>Nombre canción</h4>
                <p>Artista</p>
            </div>
        </div>

        <div class="player-center">
            <button class="control-btn">⏮</button>
            <button class="control-btn play">▶</button>
            <button class="control-btn">⏭</button>

            <input type="range" class="progress-bar">
        </div>

        <div class="player-right">
            <span>🔊</span>
            <input type="range" class="volume">
        </div>

    </footer>

    <script src="js/app.js"></script>
</body>
</html>
